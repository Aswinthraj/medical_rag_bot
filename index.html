<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAI - Advanced Medical Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff006e;
            --neon-purple: #b537f2;
            --neon-orange: #ff6b35;
            --neon-green: #00ff9f;
            --dark-bg: #0a0e27;
            --card-bg: #151932;
            --text-primary: #e8f4f8;
            --text-secondary: #8892b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Advanced Animated Background */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 245, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 110, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(181, 55, 242, 0.15) 0%, transparent 50%),
                linear-gradient(135deg, #0a0e27 0%, #151932 100%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--neon-cyan);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: float 15s infinite;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* Header */
        .header {
            background: rgba(21, 25, 50, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple)) 1;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: logoGlow 3s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 245, 255, 0.5); }
            50% { box-shadow: 0 0 50px rgba(255, 0, 110, 0.8); }
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 255, 159, 0.1);
            border: 2px solid var(--neon-green);
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 159, 0.3);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px var(--neon-green);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 30px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        /* Chat Section */
        .chat-section {
            background: rgba(21, 25, 50, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)) 1;
            border-radius: 20px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .chat-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 245, 255, 0.05), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
        }

        .input-group {
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            padding: 20px;
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: 'Space Grotesk', sans-serif;
            resize: vertical;
            transition: all 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
        }

        .slider-wrapper {
            margin-top: 25px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .slider-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-orange));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input[type="range"] {
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
            border-radius: 10px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--neon-cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: white;
            box-shadow: 0 10px 40px rgba(0, 245, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0, 245, 255, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 0, 110, 0.1);
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
        }

        .btn-secondary:hover {
            background: rgba(255, 0, 110, 0.2);
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.4);
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .loading-ring {
            width: 60px;
            height: 60px;
            border: 4px solid transparent;
            border-top: 4px solid var(--neon-cyan);
            border-right: 4px solid var(--neon-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Results */
        .results {
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .answer-container {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.1), rgba(181, 55, 242, 0.1));
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .answer-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 245, 255, 0.1), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .answer-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .answer-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        .answer-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .answer-content {
            line-height: 1.9;
            color: var(--text-primary);
            font-size: 16px;
            position: relative;
            z-index: 1;
        }

        .sources-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--neon-pink);
        }

        .source-card {
            background: rgba(10, 14, 39, 0.6);
            border-left: 4px solid var(--neon-purple);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
            position: relative;
        }

        .source-card:hover {
            transform: translateX(10px);
            border-left-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
        }

        .source-number {
            color: var(--neon-orange);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .source-text {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-card {
            background: rgba(21, 25, 50, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.05), rgba(255, 0, 110, 0.05));
            z-index: 0;
        }

        .stat-card.cyan { border-color: var(--neon-cyan); }
        .stat-card.pink { border-color: var(--neon-pink); }
        .stat-card.purple { border-color: var(--neon-purple); }
        .stat-card.green { border-color: var(--neon-green); }

        .stat-label {
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .stat-card.cyan .stat-value { color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan); }
        .stat-card.pink .stat-value { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); }
        .stat-card.purple .stat-value { color: var(--neon-purple); text-shadow: 0 0 20px var(--neon-purple); }
        .stat-card.green .stat-value { color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); }

        .error {
            background: rgba(255, 0, 110, 0.1);
            border: 2px solid var(--neon-pink);
            border-radius: 15px;
            padding: 20px;
            color: var(--neon-pink);
            margin-top: 20px;
            display: none;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="grid-overlay"></div>
    
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">
                    <h1>MEDI.AI</h1>
                    <p>ADVANCED MEDICAL INTELLIGENCE</p>
                </div>
            </div>
            <div class="status-indicator">
                <span class="pulse-dot"></span>
                <span style="font-family: 'JetBrains Mono', monospace; font-weight: 600;">SYSTEM ONLINE</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-grid">
            <div class="chat-section">
                <h2 class="section-title">🔬 NEURAL QUERY INTERFACE</h2>
                
                <div class="input-group">
                    <label class="input-label">⚡ Enter Medical Query</label>
                    <textarea id="query" placeholder="Type your medical question here... (e.g., What are the symptoms and treatment options for Type 2 diabetes?)"></textarea>
                </div>

                <div class="slider-wrapper">
                    <div class="slider-header">
                        <span class="input-label">📊 Source Documents</span>
                        <span class="slider-value" id="topkValue">5</span>
                    </div>
                    <input type="range" id="topk" min="1" max="10" value="5">
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" id="askBtn">
                        <span>🚀 GENERATE ANSWER</span>
                    </button>
                    <button class="btn btn-secondary" id="clearBtn">
                        <span>🔄 RESET</span>
                    </button>
                </div>

                <div class="loading" id="loading">
                    <div class="loading-ring"></div>
                    <p style="color: var(--neon-cyan); font-weight: 600;">PROCESSING NEURAL NETWORK...</p>
                </div>

                <div class="error" id="error"></div>

                <div class="results" id="results">
                    <div class="answer-container">
                        <div class="answer-header">
                            <div class="answer-icon">🧠</div>
                            <h3 class="answer-title">AI GENERATED RESPONSE</h3>
                        </div>
                        <div class="answer-content" id="answer"></div>
                    </div>

                    <h3 class="sources-title">📚 RETRIEVED MEDICAL SOURCES</h3>
                    <div id="contextsList"></div>
                </div>
            </div>

            <div class="sidebar">
                <div class="stat-card cyan">
                    <div class="stat-label">Total Queries</div>
                    <div class="stat-value" id="totalQueries">0</div>
                </div>
                <div class="stat-card pink">
                    <div class="stat-label">Sources Retrieved</div>
                    <div class="stat-value" id="totalSources">0</div>
                </div>
                <div class="stat-card purple">
                    <div class="stat-label">Avg Response Time</div>
                    <div class="stat-value" id="avgTime">0s</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-label">System Status</div>
                    <div class="stat-value" style="font-size: 18px;">READY</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Create floating particles
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            document.body.appendChild(particle);
        }

        let totalQueries = 0;
        let totalSources = 0;
        let totalTime = 0;

        const topkSlider = document.getElementById('topk');
        const topkValue = document.getElementById('topkValue');
        
        topkSlider.addEventListener('input', (e) => {
            topkValue.textContent = e.target.value;
        });

        document.getElementById('askBtn').addEventListener('click', async () => {
            const query = document.getElementById('query').value.trim();
            const topK = parseInt(document.getElementById('topk').value);
            
            if (!query) {
                showError('⚠️ QUERY INPUT REQUIRED');
                return;
            }

            const startTime = Date.now();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('askBtn').disabled = true;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, top_k: topK })
                });

                if (!response.ok) throw new Error('API REQUEST FAILED');

                const data = await response.json();
                const endTime = Date.now();
                const responseTime = ((endTime - startTime) / 1000).toFixed(1);
                
                document.getElementById('answer').textContent = data.answer;
                
                const list = document.getElementById('contextsList');
                list.innerHTML = '';
                data.contexts.forEach((ctx, i) => {
                    const div = document.createElement('div');
                    div.className = 'source-card';
                    div.innerHTML = `
                        <div class="source-number">SOURCE ${i + 1} / ${data.contexts.length}</div>
                        <div class="source-text">${ctx.substring(0, 300)}${ctx.length > 300 ? '...' : ''}</div>
                    `;
                    list.appendChild(div);
                });

                totalQueries++;
                totalSources += data.contexts.length;
                totalTime += parseFloat(responseTime);
                
                document.getElementById('totalQueries').textContent = totalQueries;
                document.getElementById('totalSources').textContent = totalSources;
                document.getElementById('avgTime').textContent = (totalTime / totalQueries).toFixed(1) + 's';

                document.getElementById('results').style.display = 'block';
            } catch (err) {
                showError('❌ ERROR: ' + err.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('askBtn').disabled = false;
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('query').value = '';
            document.getElementById('results').style.display = 'none';
            document.getElementById('error').style.display = 'none';
        });

        function showError(msg) {
            const err = document.getElementById('error');
            err.textContent = msg;
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 5000);
        }
    </script>
</body>
</html>
